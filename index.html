<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Grimoire</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">
  <div class="max-w-4xl mx-auto px-4 py-12">
    <header class="mb-12 text-center">
      <h1 class="text-4xl font-extrabold text-indigo-600 mb-4">Vibe Grimoire</h1>
      <p class="text-lg text-gray-600">A collection of vibe-coded tools.</p>
    </header>

    <main>
      <div class="bg-white shadow overflow-hidden sm:rounded-md">
        <ul id="tool-list" class="divide-y divide-gray-200">
          <!-- Tools will be injected here dynamically -->
        </ul>
      </div>
    </main>

    <footer class="mt-16 text-center text-sm text-gray-500">
      <p>&copy; Vibe Grimoire</p>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
